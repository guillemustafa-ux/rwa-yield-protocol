specVersion: 1.3.0
description: >-
  RWA Yield Protocol — indexes RwaVault (ERC-7540 async vault, NAV-priced) and
  RwaNavFeed (Chainlink-compatible NAV oracle) on Sepolia. See ARCHITECTURE.md §6 D4.
repository: https://github.com/guillemustafa-ux/rwa-yield-protocol
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RwaVault
    network: sepolia
    source:
      # RwaVault proxy (ERC1967/UUPS) — deployed+verified 2026-07-06, see
      # contracts/deployments/sepolia.json
      address: "0x48c78Ffe5A882069FC81Fb866510FAAE625109C4"
      abi: RwaVault
      startBlock: 11217752
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DepositRequest
        - RedeemRequest
        - DepositFulfilled
        - RedeemFulfilled
      abis:
        - name: RwaVault
          file: ./abis/RwaVault.json
      eventHandlers:
        - event: DepositRequest(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleDepositRequest
        - event: RedeemRequest(indexed address,indexed address,indexed uint256,address,uint256)
          handler: handleRedeemRequest
        - event: DepositFulfilled(indexed address,uint256,uint256)
          handler: handleDepositFulfilled
        - event: RedeemFulfilled(indexed address,uint256,uint256)
          handler: handleRedeemFulfilled
      file: ./src/rwa-vault.ts
  - kind: ethereum
    name: RwaNavFeed
    network: sepolia
    source:
      # RwaNavFeed — deployed+verified 2026-07-06, see contracts/deployments/sepolia.json
      address: "0x8805250663BAE305b3891A11Ca888200EdB161d7"
      abi: RwaNavFeed
      startBlock: 11217752
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - NavUpdate
      abis:
        - name: RwaNavFeed
          file: ./abis/RwaNavFeed.json
      eventHandlers:
        - event: NavUpdated(indexed uint80,int256,uint256)
          handler: handleNavUpdated
      file: ./src/rwa-nav-feed.ts
